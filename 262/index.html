    :root {
      --bg-page: #f4f6f9;
      --bg-panel: #ffffff;
      --text-primary: #2c3e50;
      --text-secondary: #555555;
      --accent: #0077cc;
      --shadow-light: rgba(0, 0, 0, 0.05);
      --shadow-strong: rgba(0, 0, 0, 0.1);
      --radius: 8px;
      --transition: 0.3s ease;
    }
    *, *::before, *::after {
      margin: 0; padding: 0; box-sizing: border-box;
      transition: var(--transition);
    }
    html { font-size: 16px; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-page);
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      align-items: center;

    }







  
    h1 {
      font-size: 2.5rem;
      color: var(--text-primary);
      margin-bottom: 1.5rem;
      text-align: center;
    }
    h2, h3 {
      color: var(--text-primary);
      margin-bottom: 0.75rem;
    }
    h2 { font-size: 1.75rem; }
    h3 { font-size: 1.25rem; }
  
    .selected-container,
    #daily-schedule-summary,
    #schedule-container {
      width: 100%;
      max-width: 1200px;
      margin-bottom: 2rem;
    }
  
    #daily-schedule-summary {
      background: var(--bg-panel);
      border-radius: var(--radius);
      padding: 1.25rem 1.5rem;
      box-shadow: 0 4px 8px var(--shadow-light);
    }
    #daily-schedule-summary h3 {
      color: var(--accent);
      border-bottom: 2px solid var(--accent);
      display: inline-block;
      padding-bottom: 0.25rem;
      margin-bottom: 1rem;
    }
    #daily-schedule-summary p {
      color: var(--text-secondary);
      margin: 0.4rem 0;
      font-size: 0.95rem;
    }
  
    .selected-container h1 {
      font-size: 2rem;
      color: var(--accent);
      margin-bottom: 1rem;
    }
    .selected-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px,1fr));
      gap: 1rem;
    }
    .selected-card {
      background: var(--bg-panel);
      border-radius: var(--radius);
      padding: 1.25rem;
      box-shadow: 0 6px 12px var(--shadow-light);
      position: relative;
    }
    .selected-card:hover {
      box-shadow: 0 8px 16px var(--shadow-strong);
      transform: translateY(-3px);
    }
    .selected-card h3 {
      font-size: 1.1rem;
      color: var(--accent);
      margin-bottom: 0.5rem;
    }
    .selected-card p {
      font-size: 0.95rem;
      color: var(--text-secondary);
      margin: 0.3rem 0;
    }
    .selected-card .delete-btn {
      position: absolute;
      top: 1rem; right: 1rem;
      background: none; border: none;
      font-size: 1.1rem; color: #e74c3c;
      cursor: pointer;
    }
    .selected-card .delete-btn:hover {
      color: #c0392b;
    }
  
    #schedule-container {
      display: grid;
      grid-template-columns: 1fr;
      gap: 2rem;
    }
    .course {
      background: var(--bg-panel);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 4px 12px var(--shadow-light);
    }
    .course h2 {
      background: var(--accent);
      color: #fff;
      padding: 0.75rem 1rem;
      font-size: 1.25rem;
    }
    .card-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px,1fr));
      gap: 1rem;
      padding: 1rem;
    }
    .card {
      background: var(--bg-panel);
      border-left: 4px solid var(--accent);
      border-radius: var(--radius);
      padding: 1rem;
      box-shadow: 0 4px 8px var(--shadow-light);
      position: relative;
    }
    .card:hover {
      box-shadow: 0 6px 16px var(--shadow-strong);
      transform: translateY(-2px);
    }
    .card input[type="checkbox"] {
      position: absolute;
      top: 1rem; right: 1rem;
      transform: scale(1.2);
    }
    .info span {
      display: block;
      margin: 0.3rem 0;
      font-size: 0.9rem;
      color: var(--text-secondary);
    }
    .tag {
      font-weight: 600;
      color: var(--accent);
      margin-right: 0.2rem;
    }
  
    @media (max-width: 600px) {
      h1 { font-size: 1.9rem; }
      .course h2 { font-size: 1.1rem; }
    }

    #add-course-btn {
      position: fixed;
      bottom: 5rem;
      right: 2rem;
      background: var(--accent);
      color: #a9e3eb;
      border: none;
      border-radius: 50%;
      width: 56px;
      height: 56px;
      font-size: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 8px var(--shadow-light);
      cursor: pointer;
      transition: background 0.3s;
      z-index:1000;
    }
    #add-course-btn:hover {
      background: #005fa3;
    }

    function timeToMin(str) {
      let [hm, ap] = str.split(" ");
      let [h, m] = hm.split(":").map(Number);
      if (ap.toLowerCase() === "pm" && h !== 12) h += 12;
      if (ap.toLowerCase() === "am" && h === 12) h = 0;
      return h * 60 + m;
    }
    function parseTimeRange(r) {
      if (!r || typeof r !== 'string') return [NaN, NaN]; 

      r = r.replace(/\s+/g, ' ').trim();

      let [s, e] = r.split(" - ").map(x => x.trim()),
          m = e.match(/(am|pm)/i)?.[0].toLowerCase();

      if (m) {
        if (!/(am|pm)/i.test(s)) s += " " + m; 
        if (!/(am|pm)/i.test(e)) e += " " + m; 
      }

      let start = timeToMin(s),
          end = timeToMin(e);

      if (isNaN(start) || isNaN(end)) {
        console.error(`Invalid time range: ${r}`);
        return [NaN, NaN];
      }
      
      if (start > end) start -= 12 * 60; 
      
      return [start, end];
    }

      return map[raw] || (day || '').toString().trim();
    }

    function mergeTimeSlots(timeSlotStrings) {
      if (!Array.isArray(timeSlotStrings) || timeSlotStrings.length === 0) {
        return [];
      }

      const parsedSlots = timeSlotStrings.map(slot => {
        const [start, end] = parseTimeRange(slot);
        return { original: slot, start, end };
      }).filter(slot => !isNaN(slot.start) && !isNaN(slot.end));

      if (parsedSlots.length === 0) {
        return [];
      }

      parsedSlots.sort((a, b) => a.start - b.start);

      const merged = [];
      let currentMerge = parsedSlots[0];

      for (let i = 1; i < parsedSlots.length; i++) {
        const nextSlot = parsedSlots[i];
        if (nextSlot.start <= currentMerge.end + 5) { 
          currentMerge.end = Math.max(currentMerge.end, nextSlot.end); 
        } else {
          merged.push({ start: currentMerge.start, end: currentMerge.end });
          currentMerge = nextSlot; 
        }
      }
      merged.push({ start: currentMerge.start, end: currentMerge.end }); 

      const formatMinToTime = (min) => {
        let hh = Math.floor(min / 60);
        let mm = min % 60;
        let period = "am";
        if (hh >= 12) period = "pm";
        if (hh > 12) hh -= 12;
        if (hh === 0) hh = 12; 
        return `${String(hh).padStart(2, '0')}:${String(mm).padStart(2, '0')} ${period}`;
      };

      return merged.map(slot => `${formatMinToTime(slot.start)} - ${formatMinToTime(slot.end)}`);
    }

    









    

    function findConflict(newE, courseKey) {
      const newETimeSlots = Array.isArray(newE.time) ? newE.time : [newE.time];
      const nd = extractDays(newE); 

      for (let c in selected) {
        if (c === courseKey) continue; 

        let e = selected[c]; 
        const existingTimeSlots = Array.isArray(e.time) ? e.time : [e.time];
        const ed = extractDays(e); 

        for (const newSlotStr of newETimeSlots) {
          let [ns, ne] = parseTimeRange(newSlotStr);
          if (isNaN(ns) || isNaN(ne)) continue; 

          for (const existingSlotStr of existingTimeSlots) {
            let [es, ee] = parseTimeRange(existingSlotStr);
            if (isNaN(es) || isNaN(ee)) continue; 

            let day = nd.find(d => ed.includes(d)); 
            if (day && ns < ee && es < ne) { 
              let os = Math.max(ns, es),
                  oe = Math.min(ne, ee),
                  fmt = m => {
                    let hh = Math.floor(m/60), mm = m % 60, pp = hh >= 12;
                    if (hh > 12) hh -= 12;
                    if (hh === 0) hh = 12;
                    return `${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')} ${pp ? 'pm' : 'am'}`;
                  };
              return { course: c, section: e.section, day, time: `${fmt(os)} - ${fmt(oe)}` };
            }
          }
        }
      }
      return false;
    }

    function normalizeTimeFormat(time) {
      if (!time || typeof time !== 'string') return null;

      time = time.replace(/\s+/g, ' ').trim();

      if (!/(am|pm)/i.test(time)) {
        const [start, end] = time.split('-').map(t => t.trim());
        const startHour = parseInt(start.split(':')[0], 10);
        const endHour = parseInt(end.split(':')[0], 10);

        if (startHour >= 8 && startHour < 12) {
          time = `${start} am - ${end} am`;
        } else if (startHour >= 12 || endHour >= 12) {
          time = `${start} pm - ${end} pm`;
        }
      }

      return time;
    }

    function normalizeEntryDays(courseKey, dayText, teacherText = '', isLab = false) {

    function mergeDayLabels(existingDays, incomingDays) {
      const order = ['Sun', 'Monday', 'Mon', 'Tuesday', 'Tue', 'Wednesday', 'Wed', 'Thu', 'Thursday', 'Fri', 'Friday', 'Sat', 'Saturday'];
      const seen = new Set();
      [...splitDayTokens(existingDays), ...splitDayTokens(incomingDays)].forEach(d => {
        if (d) seen.add(d);
      });
      const arr = Array.from(seen);
      arr.sort((a, b) => {
        const ai = order.findIndex(o => o.toLowerCase() === a.toLowerCase());
        const bi = order.findIndex(o => o.toLowerCase() === b.toLowerCase());
        const av = ai === -1 ? 999 : ai;
        const bv = bi === -1 ? 999 : bi;
        return av - bv;
      });
      return arr.join(' & ');
    }

    function formatGefDayTimePairs(dayTimePairs) {
      if (!Array.isArray(dayTimePairs) || !dayTimePairs.length) return '';
      return dayTimePairs.map(p => {

        const times = Array.isArray(p.time) ? p.time.join(', ') : (p.time || '');
        if (!d || !times) return '';
        const label = /^Thu$/i.test(d) ? 'Thu (Listening & Speaking)' : d;
        return `<span><span class="tag">${label}:</span> ${times}</span>`;
      }).filter(Boolean).join('');
    }

    function validateAndNormalizeData(courseData) {
      const normalizedData = {};

      for (let courseKey in courseData) {
        if (!Array.isArray(courseData[courseKey])) {
          console.error(`Invalid data for course ${courseKey}: Expected an array.`);
          continue;
        }

        const sectionsMap = {};
        const courseHasExplicitLabSection = courseData[courseKey].some(entry => {
          if (!Array.isArray(entry) || entry.length < 1) return false;
          return isExplicitLabSection(entry[0] || '');
        });

        courseData[courseKey].forEach(entry => {
          if (!Array.isArray(entry) || entry.length < 5) {
            console.error(`Invalid entry in ${courseKey}:`, entry);
            return; 
          }

          let rawSection = entry[0] || 'Unknown Section';
          let normalizedSection = rawSection.replace(/\s*L$/i, '').trim();

          let timeSlots = [];
          if (entry[4].includes(",")) {
            timeSlots = entry[4].split(',').map(t => normalizeTimeFormat(t.trim()));
          } else {
            timeSlots = [normalizeTimeFormat(entry[4])];
          }
          timeSlots = timeSlots.filter(Boolean);

          const explicitLab = courseKey.toLowerCase().includes("lab") || isExplicitLabSection(rawSection);
          const inferredLab = !explicitLab && courseHasExplicitLabSection && hasLabLikeDuration(timeSlots);
          const isLabEntry = explicitLab || inferredLab;

          if (sectionsMap[normalizedSection]) {
            sectionsMap[normalizedSection].time = sectionsMap[normalizedSection].time.concat(timeSlots);
            sectionsMap[normalizedSection].isLab = sectionsMap[normalizedSection].isLab || isLabEntry;
            sectionsMap[normalizedSection].dayTimePairs.push({
              days: normalizeEntryDays(courseKey, entry[3] || 'Unknown Days', entry[2] || 'Unknown Teacher', isLabEntry),
              time: timeSlots
            });
            sectionsMap[normalizedSection].days = mergeDayLabels(
              sectionsMap[normalizedSection].days,
              normalizeEntryDays(courseKey, entry[3] || 'Unknown Days', entry[2] || 'Unknown Teacher', isLabEntry)
            );
          } else {
            sectionsMap[normalizedSection] = {
              section: rawSection, 
              room: entry[1] || 'Unknown Room',
              teacher: entry[2] || 'Unknown Teacher',
              days: normalizeEntryDays(courseKey, entry[3] || 'Unknown Days', entry[2] || 'Unknown Teacher', isLabEntry),
              time: timeSlots, 
              isLab: isLabEntry,
              courseKey: courseKey,
              dayTimePairs: [{
                days: normalizeEntryDays(courseKey, entry[3] || 'Unknown Days', entry[2] || 'Unknown Teacher', isLabEntry),
                time: timeSlots
              }]
            };
          }
        });

        normalizedData[courseKey] = Object.values(sectionsMap).map(sectionEntry => {
          if (sectionEntry.isLab) { 
            sectionEntry.time = mergeTimeSlots(sectionEntry.time);
          }
          if (!Array.isArray(sectionEntry.time)) {
             sectionEntry.time = [sectionEntry.time];
          }
          return sectionEntry;
        });
      }

      return normalizedData;
    }

      add(source);
      add(upper);

      // Try existing-course formats: CSE2104 <-> CSE 2104
      const compact = upper.replace(/\s+/g, '');
      const existingMatch = compact.match(/^([A-Z]{2,4})(\d{3,4}(?:-[A-Z])?[A-Z]?)$/);
      if (existingMatch) {
        add(`${existingMatch[1]} ${existingMatch[2]}`);
        add(`${existingMatch[1]}${existingMatch[2]}`);
      }

      // Try UNESCO formats with normalized hyphen groups.
      const unescoDigits = upper.replace(/\s*[- ]\s*/g, '-');
      const unescoMatch = unescoDigits.match(/^(\d{3,4})-(\d{3})-(\d{3,4})$/);
      if (unescoMatch) {
        add(`${unescoMatch[1]}-${unescoMatch[2]}-${unescoMatch[3]}`);
      }

      return candidates;
    }

    async function loadCourseJSON(courseId) {
      const candidates = buildCourseIdCandidates(courseId);

      for (const candidate of candidates) {
        try {
          let response = await fetch(`${encodeURIComponent(candidate)}.json`);
          if (!response.ok) {
            continue;
          }

          let json = await response.json();
          const validatedData = validateAndNormalizeData(json);

          for (let key in validatedData) {
            data[key] = validatedData[key];
          }
          return candidate;
        } catch (err) {
          console.error(`Failed to load ${candidate}.json:`, err);
        }
      }

      console.error(`Could not resolve JSON for input: ${courseId}`);
      return null;
    }

    async function promptForCourses() {
      let added = [];

      const allCourseCodes = (typeof COURSE_DATA !== 'undefined')
        ? Array.from(new Set(Object.keys(COURSE_DATA).map(k => k.trim()).filter(Boolean))).sort((a, b) => a.localeCompare(b))
        : [];

      const buildSuggestions = (query, limit = 30) => {
        const q = (query || '').trim().toUpperCase();
        if (!q) return allCourseCodes.slice(0, limit);

        const startsWith = [];
        const includes = [];
        for (const code of allCourseCodes) {
          const upper = code.toUpperCase();
          if (upper.startsWith(q)) {
            startsWith.push(code);
          } else if (upper.includes(q)) {
            includes.push(code);
          }
          if ((startsWith.length + includes.length) >= limit) break;
        }
        return startsWith.concat(includes).slice(0, limit);
      };

      while (true) {
        let { value: courseId } = await Swal.fire({
          title: 'Add a course',
          input: 'text',
          inputPlaceholder: 'Enter course ID (e.g. CSE 2101)',
          didOpen: () => {
            const input = Swal.getInput();
            if (!input) return;

            // Prevent browser history/autofill suggestions from appearing.
            input.setAttribute('autocomplete', 'off');
            input.setAttribute('autocorrect', 'off');
            input.setAttribute('autocapitalize', 'off');
            input.setAttribute('spellcheck', 'false');
            input.name = `course-code-${Date.now()}`;

            const listId = 'course-code-suggestions';
            let dl = document.getElementById(listId);
            if (dl) dl.remove();

            dl = document.createElement('datalist');
            dl.id = listId;
            document.body.appendChild(dl);
            input.setAttribute('list', listId);

            const refreshList = () => {
              const suggestions = buildSuggestions(input.value);
              dl.innerHTML = suggestions.map(code => `<option value="${code}"></option>`).join('');
            };

            refreshList();
            input.addEventListener('input', refreshList);
          },
          showCancelButton: true,
          inputValidator: (value) => {
            if (!value) return 'Course ID cannot be empty';
            return null;
          }
        });
        if (!courseId) break; 
        courseId = courseId.trim();
        let resolvedId = await loadCourseJSON(courseId);
        if (resolvedId) {
          added.push(resolvedId);
          Swal.fire({
            icon: 'success',
            title: `${resolvedId}.json loaded`,
            toast: true,
            position: 'top',
            timer: 1200,
            showConfirmButton: false
          });
        } else {
          await Swal.fire({
            icon: 'error',
	    title: `Bro, Wait! Read this carefully.`,
            //title: `Could not find ${courseId}.Read this carefully!`,
            text: 'Please check the filename and try again. For Unesco Course Code write with hyphen. Example : 0200-017-1301. And for Regular Course Code write with gap. Example : CSE 2301'
          });
        }
        let { isConfirmed } = await Swal.fire({
          icon: 'question',
          title: 'Add another course?',
          showCancelButton: true,
          confirmButtonText: 'Yes',
          cancelButtonText: 'No'
        });
        if (!isConfirmed) break;
      }
      if (added.length > 0) {
        let stored = JSON.parse(localStorage.getItem('addedCourses') || '[]');
        let unique = Array.from(new Set([...stored, ...added]));
        localStorage.setItem('addedCourses', JSON.stringify(unique));
      }
      toggleAddCourseButton(true); 
    }

    function toggleAddCourseButton(show) {
      const addCourseBtn = document.getElementById("add-course-btn");
      addCourseBtn.style.display = show ? "flex" : "none";
    }

    document.getElementById("add-course-btn").addEventListener("click", async () => {
      await promptForCourses();
      renderSelected();
      renderSchedule();
    });

    async function loadAllStoredCourses() {
      let stored = JSON.parse(localStorage.getItem('addedCourses') || '[]');
      for (let cid of stored) {
        await loadCourseJSON(cid);
      }
    }

    async function showWhatsAppPopup() {
        const maxShows = 1;
        const key = 'whatsapp_popup_count';
        const joinedKey = 'whatsapp_joined';

        if (localStorage.getItem(joinedKey) === 'yes') {
            return;
        }

        let count = parseInt(localStorage.getItem(key)) || 0;

        if (count < maxShows) {
            const result = await Swal.fire({
                title: 'Join Our WhatsApp Community',
                text: 'Get updates, ask questions and get help whenever you’re stuck.',
                icon: 'info',
                showCancelButton: true,
                confirmButtonText: 'Join Now',
                cancelButtonText: 'Not Now',
                confirmButtonColor: '#25D366',
                reverseButtons: false
            });

            if (result.isConfirmed) {
                localStorage.setItem(joinedKey, 'yes');
                window.open('https://chat.whatsapp.com/B9vRwSqcdCHG36Bso5EMjS?mode=wwt', '_blank');
            } else {
                localStorage.setItem(key, count + 1);
            }
        }

		await handleSharedLink();
    }

    window.__appInitialized = false;
    window.initApp = async function() {
      if (window.__appInitialized) return;
      window.__appInitialized = true;

      await showWhatsAppPopup();

      let stored = JSON.parse(localStorage.getItem('addedCourses') || '[]');
      if (stored.length === 0) {
        await promptForCourses();
      } else {
        toggleAddCourseButton(true); 
      }
      await loadAllStoredCourses();
      renderSelected();
      renderSchedule();
    };

    // Fallback: if share.js is missing or does not call initApp, initialize here.
    setTimeout(() => {
      if (!window.__appInitialized) {
        window.initApp();
      }
    }, 50);


  </script>
</body>

<script>
function restartApp() {
  Swal.fire({
    icon: 'warning',
    title: 'Restart App?',
    text: 'This will reset all data and reload the app.',
    showCancelButton: true,
    confirmButtonText: 'Yes, restart',
    cancelButtonText: 'Cancel'
  }).then(result => {
    if (result.isConfirmed) {
      localStorage.clear();
      location.reload();
    }
  });
}


  </script>
